<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JS DOM</title>
</head>

<body>
  <p id="my-first-p" class="text-class paragraph">Hello World</p>
  <span id="my-second-p" class="text-class span">Hello World 2</span>
  <p>Hell World 3</p>
  <p>Hell World 4</p>
  <p id="my-third-p" class="text-class paragraph">Hello World 5</p>
  <form name="form" onsubmit="save(event)">
    <input name="input" onkeydown="testKeyDown(event)" />
    <button type="submit">
      Click me
    </button>
  </form>
  <script src="script.js"></script>
</body>

</html>
